name: Release

# Cut a release only when release-please's manifest changes — i.e. a
# release-please release PR was merged. The manifest is touched only by
# release-please, only when a release is cut.
on:
  push:
    branches: [main, release-please-refactor]
    paths: ['.release-please-manifest.json']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          target-branch: release-please-refactor
          skip-github-pull-request: true

  build-release-binary:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: dtex-linux-x64.tar.gz
            archive_cmd: tar czf dtex-linux-x64.tar.gz target/release/dtex
          - os: windows-latest
            asset_name: dtex-windows-x64.zip
            archive_cmd: 7z a dtex-windows-x64.zip ./target/release/dtex.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin dtex

      - name: Package binary
        run: ${{ matrix.archive_cmd }}

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ matrix.asset_name }}" --clobber
