name: Release

# release-please in manifest mode: on each push it opens/maintains the release
# PR; when that PR is merged, it cuts the tag + GitHub Release and the binary
# build runs. There is intentionally no build/test job here -- pr.yml already
# gates every merge, so main is trusted.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json

  build-release-binary:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            archive_ext: zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release artifacts
        # Whole workspace: produces dtex binary AND the darktide-ffi cdylib + staticlib.
        run: cargo build --release

      - name: Package release
        # Includes the dtex CLI binary, the FFI shared lib + static lib + import lib
        # (Windows), and the C header so consumers have everything in one download.
        # The release tag is baked into the archive name for unique, versioned assets.
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="${{ needs.release-please.outputs.tag_name }}-${{ matrix.platform }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "$ARCHIVE" \
              target/release/dtex.exe \
              target/release/darktide_ffi.dll \
              target/release/darktide_ffi.dll.lib \
              target/release/darktide_ffi.lib \
              crates/darktide-ffi/darktide.h
          else
            tar czf "$ARCHIVE" \
              target/release/dtex \
              target/release/libdarktide_ffi.so \
              target/release/libdarktide_ffi.a \
              crates/darktide-ffi/darktide.h
          fi
          echo "Computed archive name: $ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ env.archive }}" --clobber
