name: PR Quality Gate

# Skip release-please's bot-authored release PRs entirely: they only touch
# version/changelog files, so paths-ignore prevents the workflow from
# triggering at all — which avoids the approval-required run that
# GITHUB_TOKEN-created PRs otherwise sit in.
on:
  pull_request:
    branches: [main, release-please-refactor]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'
      - 'crates/**/CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable with rustfmt and clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace --all-targets --release

      - name: Run tests
        run: cargo test --workspace --release
