name: _CI Windows upload for v0.1.0 (temporary)

on:
  push:
    branches: [fix/release-windows-upload-shell]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --bin dtex
      - name: Package binary
        run: 7z a dtex-windows-x64.zip ./target/release/dtex.exe
      - name: Upload binary to v0.1.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload v0.1.0 dtex-windows-x64.zip --clobber
